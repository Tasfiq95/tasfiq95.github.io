<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <meta name="author" content="{{ site.title }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}" />

  <!-- Favicon (uses profile photo) -->
  <link rel="icon" type="image/jpeg" href="{{ '/assets/img/profile.jpg' | relative_url }}" />
  <link rel="apple-touch-icon" href="{{ '/assets/img/profile.jpg' | relative_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="#top" class="brand">{{ site.title }}</a>
      <nav class="nav-links">
        <a href="#about">About</a>
        <a href="#education">Education</a>
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main id="top">
    {{ content }}
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> {{ site.title }} · Built with Jekyll &amp; GitHub Pages</p>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
